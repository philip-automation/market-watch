name: pipeline

on:
  schedule:
    - cron: "4,19,34,49 * * * *"
  workflow_dispatch:

concurrency:
  group: pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Monitor
        env:
          FREELANCER_TOKEN: ${{ secrets.FREELANCER_TOKEN }}
        run: python3 monitor.py

      - name: Mail watch
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 mailwatch.py || true

      - name: Check queue
        id: q
        run: |
          count=$(python3 -c "import json,pathlib; p=pathlib.Path('state/queue.json'); print(len(json.loads(p.read_text())) if p.exists() else 0)")
          minute=$(date -u +%M)
          hour=$(date -u +%H)
          # brain runs max 2x/day (06:04 and 14:04 UTC = ~09:00 and ~17:00 Israel): we bid at most
          # once a day, so more runs just burn the Claude subscription for nothing
          if [ "$count" != "0" ] && [ "$minute" -lt 15 ] && { [ "$hour" = "06" ] || [ "$hour" = "14" ]; }; then
            echo "brain=yes" >> "$GITHUB_OUTPUT"
          else
            echo "brain=no" >> "$GITHUB_OUTPUT"
          fi
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Install Claude Code
        if: steps.q.outputs.brain == 'yes'
        run: npm install -g @anthropic-ai/claude-code

      - name: Brain
        if: steps.q.outputs.brain == 'yes'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          claude -p "Read the file prompt.md and execute its instructions exactly." \
            --model sonnet \
            --allowedTools "Read,Write,Edit,Bash(python3:*)"

      - name: Commit state
        if: always()
        run: |
          git config user.name "pipeline-bot"
          git config user.email "pipeline-bot@users.noreply.github.com"
          rm -f mailmsg.txt outbox.txt
          git add state/
          git diff --cached --quiet || git commit -m "state"
          git pull --rebase --autostash || true
          git push
